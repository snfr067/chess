<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6b3f24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="台灣暗棋">
  <title>台灣暗棋</title>
  <meta name="app-version" content="mobile-r15-safearea-fix-001">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./apple-touch-icon.svg">
  <link rel="stylesheet" href="./style.css?v=mobile-r15-safearea-fix-001">
</head>
<body>
  <div class="app-shell">
    <main>
      <section id="homeView" class="view home-view active">
        <div class="hero-card">
          <div class="hero-copy">
            <div class="hero-kicker">4 × 8 半棋</div>
            <h1>台灣暗棋</h1>            
            <div class="home-actions">
              <button id="startGameBtn" class="primary-btn">遊戲開始</button>
              <button id="openSettingsBtn" class="secondary-btn">遊戲設定</button>
            </div>
            <div class="offline-note">隨時隨地來一場</div>
          </div>
          <div class="home-board-preview" aria-hidden="true">
            <span class="mini-piece red">帥</span>
            <span class="mini-piece hidden">暗</span>
            <span class="mini-piece black">卒</span>
            <span class="mini-piece red">炮</span>
            <span class="mini-piece black">將</span>
            <span class="mini-piece red">兵</span>
            <span class="mini-piece black">包</span>
            <span class="mini-piece hidden">暗</span>
          </div>
        </div>
      </section>

      <section id="settingsView" class="view settings-view">
        <div class="page-card settings-card">
          <div class="page-title-row">
            <div>
              <div class="hero-kicker">Settings</div>
              <h2>遊戲設定</h2>
            </div>
            <button id="settingsBackBtn" class="ghost-btn">返回首頁</button>
          </div>

          <div class="setting-block">
            <label class="setting-label" for="difficultySelect">AI 難度</label>
            <select id="difficultySelect" class="select-input">
              <option value="easy">入門：反應快，搜尋較淺</option>
              <option value="normal">一般：平衡速度與強度</option>
              <option value="hard">困難：搜尋較深，風險估算更重</option>
              <option value="master">強敵：候選步更多，估算更細</option>
            </select>
            <p id="difficultyHelp" class="setting-help"></p>
          </div>

          <div class="setting-toggle-block">
            <label class="checkbox-row" for="comboRuleCheckbox">
              <input id="comboRuleCheckbox" type="checkbox">
              <span>
                <strong>連吃規則</strong>
                <small>成功食用後，同一顆棋可繼續食用；可嘗試食用暗棋，失敗則翻開目標並結束回合。</small>
              </span>
            </label>
          </div>

          <div class="delay-setting-block">
            <div class="delay-label-row">
              <label class="setting-label" for="aiDelayRange">AI 每步延遲</label>
              <span id="aiDelayValue" class="delay-value">0.8 秒</span>
            </div>
            <input id="aiDelayRange" class="range-input" type="range" min="0.2" max="2.5" step="0.1" value="0.8">
            <p class="setting-help">延遲會套用在 AI 標示、翻暗棋、食用與連吃的每個可視步驟。</p>
          </div>
        </div>
      </section>

      <section id="gameView" class="view game-view">
        <div class="game-layout">
          <div class="game-panel fixed-landscape-layout">
            <aside class="left-rail" aria-label="玩家操作與墳墓">
              <div class="game-topbar">
                <button id="gameBackBtn" class="ghost-btn">首頁</button>
                <button id="newGameBtn" class="secondary-btn compact">重開</button>
                <button id="endTurnBtn" class="primary-btn compact hidden">結束回合</button>
              </div>

              <section class="graveyard side-grave human-grave" aria-label="您的墳墓區">
                <div class="graveyard-head">
                  <div>
                    <div class="graveyard-kicker">Captured</div>
                    <strong id="leftGraveTitle">您墳墓</strong>
                  </div>
                  <span id="leftGraveCount" class="captured-count">0/16</span>
                </div>
                <div id="redGrave" class="grave-list reserve-grave" aria-label="您的被吃棋子"></div>
              </section>
            </aside>

            <section class="board-zone center-board-zone" aria-label="棋盤區">
              <div class="board-frame">
                <div id="board" class="board" aria-label="暗棋棋盤"></div>
              </div>
              <div class="status-box visual-only-status" aria-hidden="true">
                <div id="statusText" class="status-main">請先翻一顆棋。</div>
                <div id="detailText" class="status-detail">第一次翻出的顏色歸您，另一色歸 AI。</div>
              </div>
            </section>

            <aside class="right-rail" aria-label="對局資訊與 AI 墳墓">
              <div class="score-strip">
                <div class="side-card human">
                  <span>您</span>
                  <strong id="humanColorLabel">未定</strong>
                </div>
                <div class="turn-orb" id="turnOrb">先翻</div>
                <div class="side-card ai">
                  <span>AI</span>
                  <strong id="aiColorLabel">未定</strong>
                </div>
              </div>

              <section class="graveyard side-grave ai-grave" aria-label="AI 墳墓區">
                <div class="graveyard-head">
                  <div>
                    <div class="graveyard-kicker">Captured</div>
                    <strong id="rightGraveTitle">AI 墳墓</strong>
                  </div>
                  <span id="rightGraveCount" class="captured-count">0/16</span>
                </div>
                <div id="blackGrave" class="grave-list reserve-grave" aria-label="AI 的被吃棋子"></div>
              </section>

              <span id="capturedCount" class="captured-count total-captured hidden">0</span>
            </aside>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle">訊息</h2>
      <p id="modalText"></p>
      <div class="modal-actions">
        <button id="modalHomeBtn" class="secondary-btn">回首頁</button>
        <button id="modalRestartBtn" class="primary-btn">再玩一局</button>
      </div>
    </div>
  </div>

  <script src="./app.js?v=mobile-r15-safearea-fix-001"></script>
</body>
</html>
